<!DOCTYPE html>
<html>
<head>
    <title>Create Fundraising Activity</title>
</head>
<body>
    <h1>Create Fundraising Activity</h1>

    {% with messages = get_flashed_messages(with_categories = true) %}
        {% for category, message in messages %}
            <p><strong>{{ category }}:</strong> {{ message }}</p>
        {% endfor %}
    {% endwith %}

    <form method="post">
        <div>
            <label for="accountId">Account ID</label>
            <input type="number" id="accountId" name="accountId" required>
        </div>

        <div>
            <label for="categoryId">Category ID</label>
            <input type="number" id="categoryId" name="categoryId" required>
        </div>

        <div>
            <label for="name">Activity Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div>
            <label for="desc">Activity Description</label>
            <input type="text" id="desc" name="desc" required>
        </div>

        <div>
            <label for="goal">Funding Goal</label>
            <input type="number" step="0.01" id="goal" name="goal" required>
        </div>

        <div>
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" name="startDate" required>
        </div>

        <div>
            <label for="endDate">End Date</label>
            <input type="date" id="endDate" name="endDate" required>
        </div>

        <button type="submit">Create</button>
    </form>

    <p><a href="{{ url_for('fundraising_activity.list_activities') }}">Back to Activities</a></p>
</body>
</html>
