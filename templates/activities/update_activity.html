<!DOCTYPE html>
<html>
<head>
    <title>Update Activity</title>
</head>
<body>
    <h1>Update Fundraising Activity</h1>

    {% with messages = get_flashed_messages(with_categories = true) %}
        {% for category, message in messages %}
            <p><strong>{{ category }}:</strong> {{ message }}</p>
        {% endfor %}
    {% endwith %}

    <form method="post" onsubmit="return confirm('Confirm update?');">
        <div>
            <label for="id">Activity ID</label>
            <input type="number" id="id" name="id" required>
        </div>

        <div>
            <label for="name">New Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div>
            <label for="desc">New Description</label>
            <input type="text" id="desc" name="desc" required>
        </div>

        <div>
            <label for="goal">New Goal</label>
            <input type="number" step="0.01" id="goal" name="goal" required>
        </div>

        <div>
            <label for="status">Status</label>
            <input type="text" id="status" name="status" placeholder="ongoing/completed/expired/cancelled" required>
        </div>

        <button type="submit">Update</button>
    </form>

    <p><a href="{{ url_for('fundraising_activity.list_activities') }}">Back</a></p>
</body>
</html>
