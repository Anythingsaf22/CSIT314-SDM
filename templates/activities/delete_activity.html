<!DOCTYPE html>
<html>
<head>
    <title>Delete Activity</title>
</head>
<body>
    <h1>Delete Fundraising Activity</h1>

    {% with messages = get_flashed_messages(with_categories = true) %}
        {% for category, message in messages %}
            <p><strong>{{ category }}:</strong> {{ message }}</p>
        {% endfor %}
    {% endwith %}

    <form method="post" onsubmit="return confirm('Are you sure you want to delete this activity?');">

        <div>
            <label for="id">Activity ID</label>
            <input type="number" id="id" name="id" required>
        </div>

        <button type="submit">Delete</button>
    </form>

    <p><a href="{{ url_for('activity.list_activities') }}">Back</a></p>
</body>
</html>
