<!DOCTYPE html>
<html>
<head>
    <title>Update User Account</title>
</head>
<body>
    <h1>Update User Account</h1>

    {% with messages = get_flashed_messages(with_categories = true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p><strong>{{ category }}:</strong> {{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post">
        <div>
            <label for="accountId">Account ID</label>
            <input type="text" id="accountId" name="accountId">
        </div>

        <div>
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName">
        </div>

        <div>
            <label for="userName">Username</label>
            <input type="text" id="userName" name="userName">
        </div>

        <div>
            <label for="password">Password</label>
            <input type="text" id="password" name="password">
        </div>

        <div>
            <label for="birthday">DOB</label>
            <input type="date" id="birthday" name="birthday">
        </div>

        <div>
            <label for="address">Address</label>
            <input type="text" id="address" name="address">
        </div>

        <div>
            <label for="contactNumber">Contact Number</label>
            <input type="text" id="contactNumber" name="contactNumber">
        </div>

        <div>
            <label for="profileId">Profile</label>
            <select id="profileId" name="profileId">
                <option value="">Select a profile</option>
                {% for profile in profiles %}
                    <option value="{{ profile.profileId }}">
                        {{ profile.profileId }} - {{ profile.profileName }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="accountStatus">Account Status</label>
            <select id="accountStatus" name="accountStatus">
                <option value="">Select status</option>
                <option value="ACTIVE">ACTIVE</option>
                <option value="SUSPENDED">SUSPENDED</option>
                <option value="EXPIRED">EXPIRED</option>
            </select>
        </div>

        <button type="submit">Update</button>
    </form>

    <p>
        <a href="{{ url_for('user_account.list_accounts') }}">Back to Accounts</a>
    </p>
</body>
</html>
