<!DOCTYPE html>
<html>
<head>
    <title>Update User Profile</title>
</head>
<body>
    <h1>Update User Profile</h1>
    {% with messages = get_flashed_messages(with_categories = true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p><strong>{{ category }}:</strong> {{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="post" onsubmit="return confirm('Are you sure you want to update this profile?');">
        <div>
            <label for="profileId">Profile ID</label>
            <input
                type="text"
                id="profileId"
                name="profileId"
            >
        </div>

        <div>
            <label for="profileName">Profile Name</label>
            <input
                type="text"
                id="profileName"
                name="profileName"
            >
        </div>

        <div>
            <label for="profileDescription">Profile Description</label>
            <input
                type="text"
                id="profileDescription"
                name="profileDescription"
            >
        </div>

        <button type="submit">Update</button>
    </form>

    <p>
        <a href="{{ url_for('user_profile.list_profiles') }}">Back to Profiles</a>
    </p>
</body>
</html>
